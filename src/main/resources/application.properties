spring.application.name=backend

# ─── Puerto ───────────────────────────────────────────────────────────────────
server.port=8080

# Origenes permitidos para CORS. En produccion, reemplazar por el dominio real del frontend.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ─── Base de Datos (Supabase / PostgreSQL) ────────────────────────────────────
# Configura estas variables de entorno antes de ejecutar:
#   DB_URL       → ej. jdbc:postgresql://db.xxxx.supabase.co:5432/postgres
#   DB_USER      → ej. postgres
#   DB_PASSWORD  → contraseña de Supabase
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres}?prepareThreshold=0
spring.datasource.username=${DB_USER:postgres.rkfxtxuphxkbiehzvxib}
spring.datasource.password=${DB_PASSWORD:Pensador95*}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (HikariCP — default de Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# validate: verifica que el schema de la BD coincide con las entidades (NO modifica tablas)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Necesario para mapear el ENUM PostgreSQL "tipo_nivel" con @JdbcTypeCode(SqlTypes.NAMED_ENUM)
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# ─── JWT ──────────────────────────────────────────────────────────────────────
# JWT_SECRET: secreto Base64 de al menos 256 bits.
# Generar con: openssl rand -base64 64
# JWT_EXPIRATION: tiempo en milisegundos (86400000 = 24 horas)
app.jwt.secret=${JWT_SECRET:ERaJVNxmJ1sz9wSgz+OZnp7IDAGSqh/E0/e/DtDy5ru1ztVYzW1UgnNHDPVQKMVtR6g57pBeN6sHTBXsi70SsA==}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.centricorp=DEBUG
logging.level.org.springframework.security=INFO
